<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Gilly Chat</title>
  <link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@700&display=swap" rel="stylesheet"> 
<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}
body {
  font-family: 'Playfair Display', serif;
  background: linear-gradient(to bottom, #D8BFD8, #8A2BE2);
  background-attachment: fixed;
  background-size: cover;
  display: flex;
  justify-content: center;
  align-items: center;
}

.register-box {
  background: white;
  width: 90%;
  max-width: 400px;
  padding: 30px 25px;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(138,43,226,0.4);
  text-align: center;
}

h1 {
  font-family: 'Great Vibes', cursive;
  color: #8A2BE2;
  font-size: 45px;
  margin: 0 0 10px 0;
}

p {
  color: #4B0082;
  margin-bottom: 20px;
  font-size: 14px;
}

label {
  display: block;
  text-align: left;
  color: #4B0082;
  font-weight: bold;
  margin: 12px 0 5px 0;
  font-size: 14px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: 2px solid #D8BFD8;
  font-size: 16px;
  font-family: 'Playfair Display', serif;
  outline: none;
  box-sizing: border-box;
}
input:focus {
  border-color: #8A2BE2;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #8A2BE2;
  color: white;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(138,43,226,0.4);
}
button:hover {
  background: #4B0082;
}
button:active {
  transform: scale(0.98);
}
</style>
</head>
<body>

<div class="register-box">
  <h1>Gilly Chat 💜</h1>
  <p>Enter your details and your friend's details to start chatting</p>

  <label>Your Name</label>
  <input type="text" id="userName" placeholder="e.g. Gilly" required>

  <label>Your Register No</label>
  <input type="number" id="userReg" placeholder="e.g. 1001" required>

  <label>Friend's Name</label>
  <input type="text" id="friendName" placeholder="e.g. Amina" required>

  <label>Friend's Register No</label>
  <input type="number" id="friendReg" placeholder="e.g. 1002" required>

<button onclick="register()">Start Chat</button>
</div>

<script>
function register() {
  const userName = document.getElementById("userName").value.trim();
  const userReg = document.getElementById("userReg").value.trim();
  const friendName = document.getElementById("friendName").value.trim();
  const friendReg = document.getElementById("friendReg").value.trim();

  if(userName === "" || userReg === "" || friendName === "" || friendReg === "") {
    alert("Please fill all fields");
    return;
  }

  // Save to browser memory
  localStorage.setItem("userName", userName);
  localStorage.setItem("userReg", userReg);
  localStorage.setItem("friendName", friendName);
  localStorage.setItem("friendReg", friendReg);

  // Go to chat page
  window.location.href = "chat.html";
}
</script>
  <script>
  if('serviceWorker' in navigator){navigator.serviceWorker.register('service-worker.js');}</script>

</body>
</html>
